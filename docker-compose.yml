
services:
  web:
    build: .
    container_name: vite_gourmand_web
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/html
      - ./app:/var/www/app
      - ./config:/var/www/config
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: vite_gourmand_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vite_gourmand
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  